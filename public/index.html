<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-commerce eBook Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">

    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
        <h2 class="text-2xl font-bold mb-6 text-center" id="form-title">Login</h2>

        <form id="auth-form" class="space-y-4">
            <div>
                <label class="block text-gray-700">Email</label>
                <input type="email" id="email" required class="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-400">
            </div>
            <div>
                <label class="block text-gray-700">Password</label>
                <input type="password" id="password" required class="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-400">
            </div>
            <button type="submit" class="w-full bg-blue-500 text-white py-2 rounded-md hover:bg-blue-600 transition">Submit</button>
        </form>

        <div class="mt-4 text-center">
            <button id="toggle-form" class="text-blue-500 hover:underline">Need an account? Register</button>
        </div>
        <div id="message" class="mt-4 text-center text-red-500 font-semibold hidden"></div>
    </div>

    <script>
        let isLogin = true;
        const formTitle = document.getElementById('form-title');
        const authForm = document.getElementById('auth-form');
        const toggleFormBtn = document.getElementById('toggle-form');
        const messageDiv = document.getElementById('message');

        toggleFormBtn.addEventListener('click', () => {
            isLogin = !isLogin;
            formTitle.textContent = isLogin ? 'Login' : 'Register';
            toggleFormBtn.textContent = isLogin ? 'Need an account? Register' : 'Already have an account? Login';
            messageDiv.classList.add('hidden');
        });

        authForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            const endpoint = isLogin ? '/api/login' : '/api/register';

            try {
                const res = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();

                if (res.ok) {
                    window.location.href = '/home.html';
                } else {
                    messageDiv.textContent = data.error;
                    messageDiv.classList.remove('hidden');
                }
            } catch (err) {
                console.error(err);
                messageDiv.textContent = 'An error occurred';
                messageDiv.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
