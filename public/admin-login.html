<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - E-commerce eBook Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">

    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
        <h2 class="text-2xl font-bold mb-6 text-center text-red-600">Admin Login</h2>

        <form id="admin-auth-form" class="space-y-4">
            <div>
                <label class="block text-gray-700">Admin Password</label>
                <input type="password" id="password" required class="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-red-400">
            </div>
            <button type="submit" class="w-full bg-red-500 text-white py-2 rounded-md hover:bg-red-600 transition">Login as Admin</button>
        </form>

        <div id="message" class="mt-4 text-center text-red-500 font-semibold hidden"></div>

        <div class="mt-6 text-center">
            <a href="/home.html" class="text-blue-500 hover:underline">Back to Store</a>
        </div>
    </div>

    <script>
        const form = document.getElementById('admin-auth-form');
        const messageDiv = document.getElementById('message');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const password = document.getElementById('password').value;

            try {
                const res = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });
                const data = await res.json();

                if (res.ok) {
                    window.location.href = '/admin-dashboard.html';
                } else {
                    messageDiv.textContent = data.error;
                    messageDiv.classList.remove('hidden');
                }
            } catch (err) {
                console.error(err);
                messageDiv.textContent = 'An error occurred';
                messageDiv.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
