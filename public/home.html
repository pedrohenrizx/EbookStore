<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - E-commerce eBook Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">

    <nav class="bg-white shadow-md">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="text-xl font-bold text-blue-600">eBookStore</div>
                <div class="flex space-x-4">
                    <a href="/basic.html" class="text-gray-700 hover:text-blue-500">Basic Plan</a>
                    <a href="/pro.html" class="text-gray-700 hover:text-blue-500">Pro Plan</a>
                    <a href="/admin-login.html" class="text-gray-700 hover:text-blue-500 bg-gray-200 px-3 py-1 rounded">Admin Panel</a>
                    <button id="logout-btn" class="text-red-500 hover:text-red-700">Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <h1 class="text-3xl font-bold mb-6">Catalog</h1>

        <div id="catalog" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
            <!-- eBooks will be injected here -->
        </div>
    </div>

    <script>
        async function fetchUser() {
            const res = await fetch('/api/me');
            if (!res.ok) {
                window.location.href = '/';
                return false;
            }
            return true;
        }

        async function fetchCatalog() {
            const res = await fetch('/api/ebooks');
            const ebooks = await res.json();
            const catalogDiv = document.getElementById('catalog');

            ebooks.forEach(ebook => {
                const card = document.createElement('div');
                card.className = 'bg-white rounded-lg shadow-md p-4 flex flex-col';
                card.innerHTML = `
                    ${ebook.image ? `<img src="${ebook.image}" alt="${ebook.title}" class="w-full h-48 object-cover mb-4 rounded">` : '<div class="w-full h-48 bg-gray-200 mb-4 rounded flex items-center justify-center text-gray-500">No Image</div>'}
                    <h3 class="text-lg font-bold mb-2">${ebook.title}</h3>
                    <p class="text-gray-600 text-sm flex-grow mb-4">${ebook.description}</p>
                    <span class="inline-block bg-blue-100 text-blue-800 text-xs px-2 py-1 rounded uppercase font-semibold">${ebook.plan} Plan</span>
                `;
                catalogDiv.appendChild(card);
            });
        }

        document.getElementById('logout-btn').addEventListener('click', async () => {
            await fetch('/api/logout', { method: 'POST' });
            window.location.href = '/';
        });

        fetchUser().then(isLoggedIn => {
            if (isLoggedIn) {
                fetchCatalog();
            }
        });
    </script>
</body>
</html>
