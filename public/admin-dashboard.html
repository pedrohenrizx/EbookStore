<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - eBook Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">

    <nav class="bg-gray-800 text-white shadow-md">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="text-xl font-bold">Admin Dashboard</div>
                <div class="flex space-x-4 items-center">
                    <a href="/home.html" class="hover:text-gray-300">Back to Store</a>
                    <button id="logout-btn" class="bg-red-500 px-3 py-1 rounded hover:bg-red-600">Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 py-8">
        <div class="bg-white p-6 rounded-lg shadow-md mb-8">
            <h2 class="text-2xl font-bold mb-4" id="form-title">Add New eBook</h2>
            <form id="ebook-form" class="space-y-4">
                <input type="hidden" id="ebook-id">
                <div>
                    <label class="block text-gray-700">Title</label>
                    <input type="text" id="title" required class="w-full px-4 py-2 border rounded-md">
                </div>
                <div>
                    <label class="block text-gray-700">Description</label>
                    <textarea id="description" required class="w-full px-4 py-2 border rounded-md"></textarea>
                </div>
                <div>
                    <label class="block text-gray-700">Image (optional)</label>
                    <input type="file" id="image" accept="image/*" class="w-full px-4 py-2 border rounded-md">
                </div>
                <div>
                    <label class="block text-gray-700">Plan Required</label>
                    <select id="plan" class="w-full px-4 py-2 border rounded-md">
                        <option value="basic">Basic</option>
                        <option value="pro">Pro</option>
                    </select>
                </div>
                <button type="submit" class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">Save eBook</button>
                <button type="button" id="cancel-btn" class="bg-gray-400 text-white px-4 py-2 rounded hover:bg-gray-500 hidden">Cancel Edit</button>
            </form>
        </div>

        <h2 class="text-2xl font-bold mb-4">Manage eBooks</h2>
        <div class="overflow-x-auto bg-white rounded-lg shadow-md">
            <table class="min-w-full text-left border-collapse">
                <thead>
                    <tr class="bg-gray-200">
                        <th class="py-3 px-4 border-b">ID</th>
                        <th class="py-3 px-4 border-b">Image</th>
                        <th class="py-3 px-4 border-b">Title</th>
                        <th class="py-3 px-4 border-b">Plan</th>
                        <th class="py-3 px-4 border-b">Actions</th>
                    </tr>
                </thead>
                <tbody id="ebooks-table-body">
                    <!-- Rows will be injected here -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const form = document.getElementById('ebook-form');
        const formTitle = document.getElementById('form-title');
        const ebookIdInput = document.getElementById('ebook-id');
        const cancelBtn = document.getElementById('cancel-btn');

        async function checkAdmin() {
            const res = await fetch('/api/admin/check');
            if (!res.ok) {
                window.location.href = '/home.html';
                return false;
            }
            return true;
        }

        async function fetchEbooks() {
            if (!(await checkAdmin())) return;

            const res = await fetch('/api/ebooks');
            if (res.status === 401) {
                 window.location.href = '/home.html';
                 return;
            }
            const ebooks = await res.json();
            const tbody = document.getElementById('ebooks-table-body');
            tbody.innerHTML = '';

            ebooks.forEach(ebook => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="py-3 px-4 border-b">${ebook.id}</td>
                    <td class="py-3 px-4 border-b">
                        ${ebook.image ? `<img src="${ebook.image}" class="w-16 h-16 object-cover rounded">` : 'No Image'}
                    </td>
                    <td class="py-3 px-4 border-b">${ebook.title}</td>
                    <td class="py-3 px-4 border-b capitalize">${ebook.plan}</td>
                    <td class="py-3 px-4 border-b space-x-2">
                        <button onclick='editEbook(${JSON.stringify(ebook).replace(/'/g, "&#39;")})' class="text-blue-500 hover:underline">Edit</button>
                        <button onclick='deleteEbook(${ebook.id})' class="text-red-500 hover:underline">Delete</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const formData = new FormData();
            formData.append('title', document.getElementById('title').value);
            formData.append('description', document.getElementById('description').value);
            formData.append('plan', document.getElementById('plan').value);

            const imageFile = document.getElementById('image').files[0];
            if (imageFile) formData.append('image', imageFile);

            const id = ebookIdInput.value;
            const method = id ? 'PUT' : 'POST';
            const url = id ? `/api/admin/ebooks/${id}` : '/api/admin/ebooks';

            const res = await fetch(url, {
                method,
                body: formData
            });

            if (res.ok) {
                resetForm();
                fetchEbooks();
            } else {
                const data = await res.json();
                alert(data.error || 'An error occurred');
            }
        });

        window.editEbook = (ebook) => {
            formTitle.textContent = 'Edit eBook';
            ebookIdInput.value = ebook.id;
            document.getElementById('title').value = ebook.title;
            document.getElementById('description').value = ebook.description;
            document.getElementById('plan').value = ebook.plan;
            cancelBtn.classList.remove('hidden');
            window.scrollTo(0, 0);
        };

        window.deleteEbook = async (id) => {
            if (confirm('Are you sure you want to delete this eBook?')) {
                const res = await fetch(`/api/admin/ebooks/${id}`, { method: 'DELETE' });
                if (res.ok) fetchEbooks();
                else alert('Error deleting eBook');
            }
        };

        cancelBtn.addEventListener('click', resetForm);

        function resetForm() {
            form.reset();
            ebookIdInput.value = '';
            formTitle.textContent = 'Add New eBook';
            cancelBtn.classList.add('hidden');
        }

        document.getElementById('logout-btn').addEventListener('click', async () => {
            await fetch('/api/admin/logout', { method: 'POST' });
            window.location.href = '/home.html';
        });

        fetchEbooks();
    </script>
</body>
</html>
